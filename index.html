    <script>
        function updateClock() {
            const now = new Date();
            const spainTime = new Intl.DateTimeFormat('es-ES', {
                timeZone: 'Europe/Madrid',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            }).format(now);
            document.getElementById('clock').textContent = spainTime;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
